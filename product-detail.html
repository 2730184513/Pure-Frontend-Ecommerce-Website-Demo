<script>
    // Initialize about page after main app initialization
    (async function() {
        // Wait for main app initialization
        const waitForApp = () => {
            return new Promise((resolve) => {
                const checkInit = () => window.FurniroApp && window.FurniroApp.isInitialized === true;

                if (checkInit()) {
                    resolve();
                } else {
                    const checkInterval = setInterval(() => {
                        if (checkInit()) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 50);

                    // Timeout after 10 seconds
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        console.error('Timeout: Main app not initialized');
                        resolve();
                    }, 10000);
                }
            });
        };

        await waitForApp();

        try {
            console.log('🚀 Initializing About Page...');

            // Simple breadcrumb for about page
            const breadcrumb = [
                { text: 'Home', href: '/201-project/index.html' },
                { text: 'About' }
            ];

            // Load page-specific components (banner and feature-banner)
            await ComponentLoader.loadComponents([
                {
                    name: 'page-banner',
                    target: '#banner-placeholder',
                    params: {
                        'banner-title': 'About',
                        'banner-breadcrumb': breadcrumb
                    }
                },
                {
                    name: 'feature-banner',
                    target: '#feature-banner-placeholder'
                }
            ]);

            console.log('✓ About page components loaded');
        } catch (error) {
            console.error('❌ About page initialization failed:', error);
        }
    })();
</script>
