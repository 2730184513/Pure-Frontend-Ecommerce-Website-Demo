<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <link rel="stylesheet" href="./css/layout/main.css">

    <!-- Header component styles -->
    <link rel="stylesheet" href="./css/layout/header.css">
    <link rel="stylesheet" href="./css/components/header/search.css">
    <link rel="stylesheet" href="./css/components/header/dropdown-base.css">
    <link rel="stylesheet" href="./css/components/header/cart.css">
    <link rel="stylesheet" href="./css/components/header/wishlist.css">
    <link rel="stylesheet" href="./css/components/header/user.css">

    <link rel="stylesheet" href="./css/layout/footer.css">
    <link rel="stylesheet" href="./css/core/toast.css">

    <!-- Breadcrumb uses page-banner.css styles -->
    <link rel="stylesheet" href="./css/components/banners/page-banner.css">

    <!-- Product Detail page layout -->
    <link rel="stylesheet" href="./css/layout/product-detail.css">

    <!-- Product Detail page component styles -->
    <link rel="stylesheet" href="./css/pages/product-detail/breadcrumb.css">
    <link rel="stylesheet" href="./css/pages/product-detail/product-info.css">
    <link rel="stylesheet" href="./css/pages/product-detail/product-text-info.css">
    <link rel="stylesheet" href="./css/pages/product-detail/product-selection.css">
    <link rel="stylesheet" href="./css/pages/product-detail/product-description.css">
    <link rel="stylesheet" href="./css/core/products.css">
    <link rel="stylesheet" href="./css/core/pop-up.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
            rel="stylesheet">
</head>
<body>
<div id="header-placeholder"></div>

<!-- Breadcrumb Navigation Section -->
<section class="breadcrumb-section" id="product-breadcrumb">
    <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <!-- Breadcrumb content will be dynamically generated by BreadcrumbRenderer -->
        </nav>
    </div>
</section>

<!-- Product Info Section (Left: Images, Right: Details) -->
<section class="product-info-section" id="product-info">
    <div class="container">
        <!-- Product info content will be dynamically generated by ProductInfoRenderer -->
    </div>
</section>

<!-- Product Description Tabs Section -->
<section class="product-description-section" id="product-description">
    <div class="container">
        <!-- Description tabs content will be dynamically generated by ProductDescriptionRenderer -->
    </div>
</section>

<!-- Related Products Section -->
<section class="related-products-section" id="related-products">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Related Products</h2>
        </div>
        <div class="product-grid" id="related-products-grid">
            <!-- Related products will be dynamically loaded by RelatedProductsManager -->
        </div>
        <div class="show-more-container">
            <button class="btn-show-more" id="show-more-related">
                <span>Show More</span>
            </button>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>

<!-- Core utilities -->
<script src="./js/component/component-loader.js"></script>
<script src="./js/core/page-utility.js"></script>
<script src="./js/core/toast.js"></script>
<script src="./js/core/auth-guard.js"></script>
<script src="./js/core/navigate.js"></script>

<!-- Data layer -->
<script src="./js/core/product-repository.js"></script>
<script src="./js/core/data-sync-utils.js"></script>
<script src="./js/pages/shop/product-filter.js"></script>

<!-- Header components -->
<script src="./js/component/header/search.js"></script>
<script src="./js/component/header/cart-dropdown-renderer.js"></script>
<script src="./js/component/header/cart.js"></script>
<script src="./js/component/header/wishlist-dropdown-renderer.js"></script>
<script src="./js/component/header/wishlist.js"></script>
<script src="./js/component/header/user-dropdown-renderer.js"></script>
<script src="./js/component/header/user.js"></script>

<!-- Product rendering -->
<script src="./js/core/pop-up.js"></script>
<script src="./js/core/product-card-renderer.js"></script>

<!-- Product Detail Section Renderers -->
<script src="./js/pages/product-detail/breadcrumb-renderer.js"></script>
<script src="./js/pages/product-detail/product-info-renderer.js"></script>
<script src="./js/pages/product-detail/product-description-renderer.js"></script>

<!-- Product Detail Section Managers -->
<script src="./js/pages/product-detail/product-info-manager.js"></script>
<script src="./js/pages/product-detail/product-description-manager.js"></script>
<script src="./js/pages/product-detail/related-products-manager.js"></script>

<!-- Page managers -->
<script src="./js/manager/header-manager.js"></script>
<script src="./js/manager/product-detail-manager.js"></script>

<!-- Main controller (must be last) -->
<script src="./js/manager/main.js"></script>
</body>
</html>
