<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Furniro</title>

    <link rel="stylesheet" href="/201-project/css/layout/main.css">

    <!-- Header component styles -->
    <link rel="stylesheet" href="/201-project/css/layout/header.css">
    <link rel="stylesheet" href="/201-project/css/components/header/search.css">
    <link rel="stylesheet" href="/201-project/css/components/header/cart-wishlist.css">

    <link rel="stylesheet" href="/201-project/css/layout/footer.css">
    <link rel="stylesheet" href="/201-project/css/core/toast.css">
    <link rel="stylesheet" href="/201-project/css/components/banners/page-banner.css">
    <link rel="stylesheet" href="/201-project/css/components/banners/feature-banner.css">

    <!-- Cart-specific styles -->
    <link rel="stylesheet" href="/201-project/css/pages/cart/cart-product-line.css">
    <link rel="stylesheet" href="/201-project/css/pages/cart/cart-checkbox.css">
    <link rel="stylesheet" href="/201-project/css/pages/cart/cart-summary.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
            rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div id="banner-placeholder"></div>

<!-- Cart Items Container -->
<div class="cart-container" id="cart-items-container">
    <!-- Cart items will be dynamically rendered here -->
</div>

<!-- Fixed Bottom Summary Section -->
<div class="summary-section">
    <!-- Selected Items Preview (Hidden by default) -->
    <div class="selected-items-preview" id="selectedItemsPreview">
        <div class="preview-header">Selected items:</div>
        <div class="preview-carousel">
            <button class="carousel-btn">‹</button>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Preview items will be added dynamically -->
                </div>
            </div>
            <button class="carousel-btn">›</button>
        </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar">
        <div class="select-all-container">
            <input type="checkbox" id="selectAll" class="select-all-checkbox">
            <label for="selectAll" class="select-all-custom"></label>
            <label for="selectAll" class="select-all-label">Select All</label>
        </div>

        <button class="selected-count-btn">
            <span>Selected <span id="selectedCount">0</span> items</span>
            <img src="/201-project/images/icons/down.png" alt="arrow" class="arrow-icon" id="arrowIcon">
        </button>

        <div class="summary-details">
            <div class="summary-item">
                Product Total: <span id="productTotal">RM 0.00</span>
            </div>
            <div class="summary-item">
                Discount: <span id="discount">RM 0.00</span>
            </div>
            <div class="total-price">
                Total: <span class="price" id="totalPrice">RM 0.00</span>
            </div>
        </div>

        <button class="checkout-btn">Checkout (<span id="checkoutCount">0</span>)</button>
    </div>
</div>

<div id="feature-banner-placeholder"></div>

<div id="footer-placeholder"></div>

<!-- Core utilities -->
<script src="/201-project/js/component/component-loader.js"></script>
<script src="/201-project/js/core/page-utility.js"></script>
<script src="/201-project/js/core/toast.js"></script>


<!-- Data layer -->
<script src="/201-project/js/core/product-repository.js"></script>
<script src="/201-project/js/pages/shop/product-filter.js"></script>

<!-- Header components -->
<script src="/201-project/js/component/header/search.js"></script>
<script src="/201-project/js/component/header/cart-dropdown-renderer.js"></script>
<script src="/201-project/js/component/header/cart.js"></script>
<script src="/201-project/js/component/header/wishlist-dropdown-renderer.js"></script>
<script src="/201-project/js/component/header/wishlist.js"></script>

<!-- Cart page specific components -->
<script src="/201-project/js/pages/cart/cart-product-line-renderer.js"></script>
<script src="/201-project/js/pages/cart/cart-summary-carousel.js"></script>
<script src="/201-project/js/pages/cart/cart-summary-manager.js"></script>

<!-- Page managers -->
<script src="/201-project/js/manager/header-manager.js"></script>
<script src="/201-project/js/manager/cart-manager.js"></script>

<!-- Main controller (initializes all page managers) -->
<script src="/201-project/js/manager/main.js"></script>

<script>
    // Load page banner and feature banner components, then initialize cart page
    document.addEventListener('DOMContentLoaded', async () => {
        // Simple breadcrumb for cart page
        const breadcrumb = [{text: 'Home', href: '/201-project/index.html'}, {text: 'Cart'}];

        await ComponentLoader.loadComponents([
            {
                name: 'page-banner',
                target: '#banner-placeholder',
                params: {
                    'banner-title': 'Cart',
                    'banner-breadcrumb': breadcrumb
                }
            },
            {
                name: 'feature-banner',
                target: '#feature-banner-placeholder'
            }
        ]);

        // Wait for main app to be fully initialized
        const waitForApp = () => {
            return new Promise((resolve) => {
                const checkInit = () => window.FurniroApp && window.FurniroApp.isInitialized === true;

                if (checkInit()) {
                    resolve();
                } else {
                    const checkInterval = setInterval(() => {
                        if (checkInit()) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 50);

                    // Timeout after 5 seconds
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        console.warn('Main app initialization timeout');
                        resolve();
                    }, 5000);
                }
            });
        };

        await waitForApp();

        // Initialize cart page manager
        if (window.CartPageManager) {
            const cartPageManager = new CartPageManager();
            cartPageManager.init();
        } else {
            console.error('CartPageManager not found - check script loading order');
        }
    });
</script>

</body>
</html>
