<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Furniro</title>

    <link rel="stylesheet" href="css/main.css">

    <!-- Header component styles -->
    <link rel="stylesheet" href="css/header-base.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/cart-wishlist.css">

    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/feature-banner.css">

    <!-- Cart-specific styles -->
    <link rel="stylesheet" href="css/cart-product-line.css">
    <link rel="stylesheet" href="css/cart-checkbox.css">
    <link rel="stylesheet" href="css/cart-summary.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
            rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div id="banner-placeholder"></div>

<!-- Cart Items Container -->
<div class="cart-container" id="cart-items-container">
    <!-- Cart items will be dynamically rendered here -->
</div>

<!-- Fixed Bottom Summary Section -->
<div class="summary-section">
    <!-- Selected Items Preview (Hidden by default) -->
    <div class="selected-items-preview" id="selectedItemsPreview">
        <div class="preview-header">Selected items:</div>
        <div class="preview-carousel">
            <button class="carousel-btn">‹</button>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Preview items will be added dynamically -->
                </div>
            </div>
            <button class="carousel-btn">›</button>
        </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar">
        <div class="select-all-container">
            <input type="checkbox" id="selectAll" class="select-all-checkbox">
            <label for="selectAll" class="select-all-custom"></label>
            <label for="selectAll" class="select-all-label">Select All</label>
        </div>

        <button class="selected-count-btn">
            <span>Selected <span id="selectedCount">0</span> items</span>
            <img src="/201-project/images/icons/down.png" alt="arrow" class="arrow-icon" id="arrowIcon">
        </button>

        <div class="summary-details">
            <div class="summary-item">
                Product Total: <span id="productTotal">RM 0.00</span>
            </div>
            <div class="summary-item">
                Discount: <span id="discount">RM 0.00</span>
            </div>
            <div class="total-price">
                Total: <span class="price" id="totalPrice">RM 0.00</span>
            </div>
        </div>

        <button class="checkout-btn">Checkout (<span id="checkoutCount">0</span>)</button>
    </div>
</div>

<div id="feature-banner-placeholder"></div>

<div id="footer-placeholder"></div>

<!-- Core utilities -->
<script src="js/component-loader.js"></script>
<script src="js/toast.js"></script>

<!-- Data layer -->
<script src="js/product-data-loader.js"></script>
<script src="js/product-repository.js"></script>

<!-- Header components (registered in main.js) -->
<script src="js/navigate.js"></script>
<script src="js/search.js"></script>
<script src="js/cart-dropdown-renderer.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist-dropdown-renderer.js"></script>
<script src="js/wishlist.js"></script>

<!-- Cart page specific components -->
<script src="js/cart-product-line-renderer.js"></script>
<script src="js/cart-summary-carousel.js"></script>
<script src="js/cart-summary-manager.js"></script>
<script src="js/cart-page-manager.js"></script>

<!-- Main controller (initializes all page managers) -->
<script src="js/main.js"></script>

<script>
    // Load page banner and feature banner components, then initialize cart page
    document.addEventListener('DOMContentLoaded', async () => {
        // Get dynamic breadcrumb based on referrer
        const breadcrumb = window.FurniroApp && typeof FurniroApp.getDynamicBreadcrumb === 'function'
            ? FurniroApp.getDynamicBreadcrumb()
            : [{text: 'Home', href: 'index.html'}, {text: 'Cart'}];

        await ComponentLoader.loadComponents([
            {
                name: 'page-banner',
                target: '#banner-placeholder',
                params: {
                    'banner-title': 'Cart',
                    'banner-breadcrumb': breadcrumb
                }
            },
            {
                name: 'feature-banner',
                target: '#feature-banner-placeholder'
            }
        ]);

        // Initialize cart page after main app loads
        setTimeout(() => {
            if (window.CartPageManager) {
                const cartPageManager = new CartPageManager();
                cartPageManager.init();
            }
        }, 500);
    });
</script>

</body>
</html>
