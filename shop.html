<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Furniro</title>

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/shop-banner.css">
    <link rel="stylesheet" href="css/shop-layout.css">
    <link rel="stylesheet" href="css/shop-toolbar.css">
    <link rel="stylesheet" href="css/pagination.css">
    <link rel="stylesheet" href="css/filter.css">
    <link rel="stylesheet" href="css/feature-banner.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
            rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div id="search-overlay" class="search-overlay hidden">
    <div class="search-bar-container">
        <div class="search-icon-large"></div>
        <input type="text" id="global-search-input" placeholder="Search for products (Leave empty for all)...">
        <button id="global-search-btn">Search</button>
    </div>
</div>

<section class="shop-hero">
    <div class="hero-bg-blur"></div>
    <div class="shop-hero-content">
        <div class="page-title">Shop</div>
        <div class="breadcrumb">
            <a href="index.html" class="breadcrumb-link">Home</a>
            <span class="breadcrumb-separator">&gt;</span>
            <span class="breadcrumb-current">Shop</span>
        </div>
    </div>
</section>

<section class="shop-layout-wrapper" id="shop-layout">

    <aside id="filter-sidebar" class="filter-sidebar">
        <div class="filter-inner-content">
            <div class="filter-header">
                <div class="filter-title">Filters</div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Category</div>
                <div class="filter-options category-options">
                    <label class="category-btn"><input type="checkbox" value="chair"><span>Chair</span></label>
                    <label class="category-btn"><input type="checkbox" value="lamp"><span>Lamp</span></label>
                    <label class="category-btn"><input type="checkbox" value="sofa"><span>Sofa</span></label>
                    <label class="category-btn"><input type="checkbox" value="table"><span>Table</span></label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Price</div>
                <div class="range-slider-container">
                    <div class="slider-track" id="price-track"></div>
                    <input type="range" id="price-min-range" min="0" max="10000" step="100" value="0">
                    <input type="range" id="price-max-range" min="0" max="10000" step="100" value="10000">
                </div>
                <div class="range-inputs">
                    <div class="input-wrapper">
                        <span class="input-label-text">Min</span>
                        <input type="number" id="price-min-input" value="0" min="0" max="10000">
                    </div>
                    <span class="range-separator">-</span>
                    <div class="input-wrapper">
                        <span class="input-label-text">Max</span>
                        <input type="number" id="price-max-input" value="10000" min="0" max="10000">
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Rating</div>
                <div class="range-slider-container">
                    <div class="slider-track" id="rate-track"></div>
                    <input type="range" id="rate-min-range" min="0" max="5" step="0.1" value="0">
                    <input type="range" id="rate-max-range" min="0" max="5" step="0.1" value="5">
                </div>
                <div class="range-inputs">
                    <div class="input-wrapper">
                        <span class="input-label-text">Min</span>
                        <input type="number" id="rate-min-input" value="0.0" step="0.1" min="0" max="5">
                    </div>
                    <span class="range-separator">-</span>
                    <div class="input-wrapper">
                        <span class="input-label-text">Max</span>
                        <input type="number" id="rate-max-input" value="5.0" step="0.1" min="0" max="5">
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Launch Time</div>
                <div class="date-inputs">
                    <div class="date-field">
                        <span class="date-label">From</span>
                        <input type="text" id="date-from" class="date-picker" placeholder="yyyy/mm/dd">
                    </div>
                    <div class="date-field">
                        <span class="date-label">To</span>
                        <input type="text" id="date-to" class="date-picker" placeholder="yyyy/mm/dd">
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="product-content-wrapper">
        <div class="shop-toolbar" id="shop-toolbar">
            <div class="toolbar-left">
                <button id="filter-toggle-btn" class="filter-btn">
                    <img src="images/icons/filter.png" class="icon-filter" alt="Filter">
                    <span class="filter-span">Filter</span>
                </button>
                <div class="divider"></div>
                <span id="showing-results-text" class="results-text">Showing 0 results</span>
            </div>

            <div class="toolbar-right">
                <div class="control-group">
                    <span class="control-label">Show</span>
                    <div class="custom-dropdown" id="show-dropdown">
                        <div class="selected-option">
                            <span id="current-show-label">16</span>
                            <img src="/201-project/images/icons/down.png" class="dropdown-arrow" alt="arrow">
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-item" data-value="4">
                                <span>4</span>
                            </div>
                            <div class="dropdown-item" data-value="8">
                                <span>8</span>
                            </div>
                            <div class="dropdown-item" data-value="12">
                                <span>12</span>
                            </div>
                            <div class="dropdown-item active" data-value="16">
                                <span>16</span>
                            </div>
                            <div class="dropdown-item" data-value="20">
                                <span>20</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="control-group">
                    <span class="control-label">Sort by</span>
                    <div class="custom-dropdown" id="sort-dropdown">
                        <div class="selected-option">
                            <span id="current-sort-label">Default</span>
                            <img src="/201-project/images/icons/down.png" class="dropdown-arrow" alt="arrow">
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-item" data-key="name">
                                <span>Name</span>
                                <span class="sort-state-icon"></span>
                            </div>
                            <div class="dropdown-item" data-key="price">
                                <span>Price</span>
                                <span class="sort-state-icon"></span>
                            </div>
                            <div class="dropdown-item" data-key="rate">
                                <span>Rating</span>
                                <span class="sort-state-icon"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="product-grid-container">
            <div class="product-grid" id="shop-product-grid"></div>
            <div class="pagination" id="pagination-container"></div>
        </div>
    </main>

</section>

<section class="features-banner">
    <div class="container features-container">
        <div class="feature-item">
            <div class="feature-icon icon-trophy"></div>
            <div class="feature-text">
                <div class="feature-title">High Quality</div>
                <div class="feature-desc">crafted from top materials</div>
            </div>
        </div>
        <div class="feature-item">
            <div class="feature-icon icon-guarantee"></div>
            <div class="feature-text">
                <div class="feature-title">Warranty Protection</div>
                <div class="feature-desc">Over 2 years</div>
            </div>
        </div>
        <div class="feature-item">
            <div class="feature-icon icon-shipping"></div>
            <div class="feature-text">
                <div class="feature-title">Free Shipping</div>
                <div class="feature-desc">Order over 150 $</div>
            </div>
        </div>
        <div class="feature-item">
            <div class="feature-icon icon-support"></div>
            <div class="feature-text">
                <div class="feature-title">24 / 7 Support</div>
                <div class="feature-desc">Dedicated support</div>
            </div>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>

<!-- Core utilities -->
<script src="js/component-loader.js"></script>

<!-- Data layer -->
<script src="js/product-data-loader.js"></script>
<script src="js/product-filter.js"></script>
<script src="js/product-repository.js"></script>

<!-- Header components -->
<script src="js/navigate.js"></script>
<script src="js/search.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/header.js"></script>

<!-- Product rendering -->
<script src="js/pop-up.js"></script>
<script src="js/product-card-renderer.js"></script>

<!-- Shop page components -->
<script src="js/filter-sidebar.js"></script>
<script src="js/show-sort.js"></script>
<script src="js/highlighting.js"></script>
<script src="js/paging.js"></script>
<script src="js/toolbar.js"></script>
<script src="js/shop.js"></script>

<!-- Main controller -->
<script src="js/main.js"></script>

</body>
</html>
