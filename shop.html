<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Furniro</title>

    <link rel="stylesheet" href="/201-project/css/layout/main.css">

    <!-- Header component styles -->
    <link rel="stylesheet" href="/201-project/css/layout/header.css">
    <link rel="stylesheet" href="/201-project/css/components/header/search.css">
    <link rel="stylesheet" href="/201-project/css/components/header/dropdown-base.css">
    <link rel="stylesheet" href="/201-project/css/components/header/cart.css">
    <link rel="stylesheet" href="/201-project/css/components/header/wishlist.css">
    <link rel="stylesheet" href="/201-project/css/components/header/user.css">

    <link rel="stylesheet" href="/201-project/css/layout/footer.css">
    <link rel="stylesheet" href="/201-project/css/core/products.css">
    <link rel="stylesheet" href="/201-project/css/core/pop-up.css">
    <link rel="stylesheet" href="/201-project/css/core/toast.css">
    <link rel="stylesheet" href="/201-project/css/components/banners/page-banner.css">
    <link rel="stylesheet" href="/201-project/css/layout/shop.css">
    <link rel="stylesheet" href="/201-project/css/pages/shop/toolbar.css">
    <link rel="stylesheet" href="/201-project/css/pages/shop/pagination.css">
    <link rel="stylesheet" href="/201-project/css/pages/shop/filter.css">
    <link rel="stylesheet" href="/201-project/css/components/banners/feature-banner.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
            rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div id="banner-placeholder"></div>

<section class="shop-layout-wrapper" id="shop-layout">

    <aside id="filter-sidebar" class="filter-sidebar">
        <div class="filter-inner-content">
            <div class="filter-header">
                <div class="filter-title">Filters</div>
                <button id="clear-all-filters-btn" class="clear-all-btn">Clear All</button>
            </div>

            <div class="filter-group">
                <div class="filter-label">Category</div>
                <div class="filter-options category-options">
                    <label class="category-btn"><input type="checkbox" value="chair"><span>Chair</span></label>
                    <label class="category-btn"><input type="checkbox" value="lamp"><span>Lamp</span></label>
                    <label class="category-btn"><input type="checkbox" value="sofa"><span>Sofa</span></label>
                    <label class="category-btn"><input type="checkbox" value="table"><span>Table</span></label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Price</div>
                <div class="range-slider-container">
                    <div class="slider-track" id="price-track"></div>
                    <input type="range" id="price-min-range" min="0" max="10000" step="100" value="0">
                    <input type="range" id="price-max-range" min="0" max="10000" step="100" value="10000">
                </div>
                <div class="range-inputs">
                    <div class="input-wrapper">
                        <span class="input-label-text">Min</span>
                        <input type="number" id="price-min-input" value="0" min="0" max="10000">
                    </div>
                    <span class="range-separator">-</span>
                    <div class="input-wrapper">
                        <span class="input-label-text">Max</span>
                        <input type="number" id="price-max-input" value="10000" min="0" max="10000">
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Rating</div>
                <div class="range-slider-container">
                    <div class="slider-track" id="rate-track"></div>
                    <input type="range" id="rate-min-range" min="0" max="5" step="0.1" value="0">
                    <input type="range" id="rate-max-range" min="0" max="5" step="0.1" value="5">
                </div>
                <div class="range-inputs">
                    <div class="input-wrapper">
                        <span class="input-label-text">Min</span>
                        <input type="number" id="rate-min-input" value="0.0" step="0.1" min="0" max="5">
                    </div>
                    <span class="range-separator">-</span>
                    <div class="input-wrapper">
                        <span class="input-label-text">Max</span>
                        <input type="number" id="rate-max-input" value="5.0" step="0.1" min="0" max="5">
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">Launch Time</div>
                <div class="date-inputs">
                    <div class="date-field">
                        <span class="date-label">From</span>
                        <input type="text" id="date-from" class="date-picker" placeholder="yyyy/mm/dd">
                    </div>
                    <div class="date-field">
                        <span class="date-label">To</span>
                        <input type="text" id="date-to" class="date-picker" placeholder="yyyy/mm/dd">
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="product-content-wrapper">
        <div class="shop-toolbar" id="shop-toolbar">
            <div class="toolbar-left">
                <button class="filter-btn" id="filter-toggle-btn">
                    <div class="icon-filter-container">
                        <img class="icon-filter icon-filter-main" src="/201-project/images/icons/filter.png" alt="Filter">
                        <img class="icon-filter icon-filter-alt" src="/201-project/images/icons/arrow-left.png" alt="Close Filter">
                    </div>
                    <span class="filter-span">Filter</span>
                </button>

                <div class="divider"></div>
                <span id="showing-results-text" class="results-text">Showing 0 results</span>
            </div>

            <div class="toolbar-right">
                <div class="control-group">
                    <span class="control-label">Show</span>
                    <div class="custom-dropdown" id="show-dropdown">
                        <div class="selected-option">
                            <span id="current-show-label">16</span>
                            <img src="/201-project/images/icons/down.png" class="dropdown-arrow" alt="arrow">
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-item" data-value="4">
                                <span>4</span>
                            </div>
                            <div class="dropdown-item" data-value="8">
                                <span>8</span>
                            </div>
                            <div class="dropdown-item" data-value="12">
                                <span>12</span>
                            </div>
                            <div class="dropdown-item active" data-value="16">
                                <span>16</span>
                            </div>
                            <div class="dropdown-item" data-value="20">
                                <span>20</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="control-group">
                    <span class="control-label">Sort by</span>
                    <div class="custom-dropdown" id="sort-dropdown">
                        <div class="selected-option">
                            <span id="current-sort-label">Default</span>
                            <img src="/201-project/images/icons/down.png" class="dropdown-arrow" alt="arrow">
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-item" data-key="name">
                                <span>Name</span>
                                <span class="sort-state-icon"></span>
                            </div>
                            <div class="dropdown-item" data-key="price">
                                <span>Price</span>
                                <span class="sort-state-icon"></span>
                            </div>
                            <div class="dropdown-item" data-key="rate">
                                <span>Rating</span>
                                <span class="sort-state-icon"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="product-grid-container">
            <div class="product-grid" id="shop-product-grid"></div>
            <div class="pagination" id="pagination-container"></div>
        </div>
    </main>

</section>

<div id="feature-banner-placeholder"></div>

<div id="footer-placeholder"></div>

<!-- Core utilities -->
<script src="/201-project/js/component/component-loader.js"></script>
<script src="/201-project/js/core/page-utility.js"></script>
<script src="/201-project/js/core/toast.js"></script>
<script src="/201-project/js/core/auth-guard.js"></script>
<script src="/201-project/js/core/navigate.js"></script>

<!-- Data layer -->
<script src="/201-project/js/core/product-repository.js"></script>
<script src="/201-project/js/core/data-sync-utils.js"></script>
<script src="/201-project/js/pages/shop/product-filter.js"></script>

<!-- Header components -->
<script src="/201-project/js/component/header/search.js"></script>
<script src="/201-project/js/component/header/cart-dropdown-renderer.js"></script>
<script src="/201-project/js/component/header/cart.js"></script>
<script src="/201-project/js/component/header/wishlist-dropdown-renderer.js"></script>
<script src="/201-project/js/component/header/wishlist.js"></script>
<script src="/201-project/js/component/header/user-dropdown-renderer.js"></script>
<script src="/201-project/js/component/header/user.js"></script>

<!-- Product rendering -->
<script src="/201-project/js/core/pop-up.js"></script>
<script src="/201-project/js/core/product-card-renderer.js"></script>

<!-- Shop page specific components (load in dependency order) -->
<script src="/201-project/js/pages/shop/sort-strategy.js"></script>
<script src="/201-project/js/pages/shop/filter-sidebar.js"></script>
<script src="/201-project/js/pages/shop/show-sort.js"></script>
<script src="/201-project/js/pages/shop/paging.js"></script>
<script src="/201-project/js/pages/shop/toolbar.js"></script>

<!-- Page managers -->
<script src="/201-project/js/manager/header-manager.js"></script>
<script src="/201-project/js/manager/shop-manager.js"></script>

<!-- Main controller (initializes all page managers) -->
<script src="/201-project/js/manager/main.js"></script>

<script>
    // Initialize shop page components
    document.addEventListener('DOMContentLoaded', async () => {
        // Load banner components
        await ComponentLoader.loadComponents([
            {
                name: 'page-banner',
                target: '#banner-placeholder',
                params: {
                    'banner-title': 'Shop',
                    'banner-breadcrumb': 'Shop'
                }
            },
            {
                name: 'feature-banner',
                target: '#feature-banner-placeholder'
            }
        ]);

        // Main app initialization is handled by main.js
        // ShopManager will be initialized automatically by main.js
        console.log('✓ Shop page components loaded');
    });
</script>

</body>
</html>
